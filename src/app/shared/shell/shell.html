<div class="shell">
  <aside class="sidebar">
    <div class="brand">
      <div class="brand-mark">A</div>
      <div class="brand-text">
        <div class="brand-name">Atlas</div>
        <div class="brand-tag">Squad &amp; Service Catalog</div>
      </div>
    </div>

    <nav class="nav">
      @for (item of nav; track item.path) {
        <a
          [routerLink]="item.path"
          routerLinkActive="active"
          class="nav-item"
        >
          <span class="nav-icon">{{ item.icon }}</span>
          <span class="nav-label">{{ item.label }}</span>
        </a>
      }
    </nav>

    <div class="sidebar-footer">
      <div class="version">v0.0.1</div>
    </div>
  </aside>

  <div class="main">
    <header class="topbar">
      <div class="topbar-title">Atlas Console</div>
      <div class="topbar-actions">
        <span class="env-badge">dev</span>
      </div>
    </header>

    <main class="content">
      <router-outlet />
    </main>
  </div>
</div>
